name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: python -m pip install -e "packages/ingestion[dev]" -e "apps/api[dev]"

      - name: Run checks
        run: scripts/check.sh
