name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: python -m pip install -e "packages[dev]" -e "apps/api[dev]"

      - name: Run checks
        run: scripts/check.sh

      - name: Publish evaluation summary
        run: python scripts/evaluate_retrieval.py --check --github-summary "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: |
            docs/evaluation-retrieval-report.json
            docs/evaluation-report.md
