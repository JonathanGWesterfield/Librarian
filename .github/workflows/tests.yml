name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: python -m pip install -e "packages[dev]" -e "apps/api[dev]"

      - name: Run checks
        run: scripts/check.sh

      - name: Prepare base evaluation report
        if: github.event_name == 'pull_request'
        run: |
          git show "origin/${{ github.base_ref }}:docs/evaluation-retrieval-report.json" > /tmp/librarian-base-evaluation-report.json || true

      - name: Publish evaluation summary
        run: python scripts/evaluate_retrieval.py --check --github-summary "$GITHUB_STEP_SUMMARY" --compare-to /tmp/librarian-base-evaluation-report.json

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: |
            docs/evaluation-retrieval-report.json
            docs/evaluation-report.md
