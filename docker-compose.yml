services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ${LIBRARIAN_HOST_BOOKS_DIR:-./Epub-Books}:/books:ro
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
