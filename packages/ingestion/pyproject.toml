[project]
name = "librarian-ingestion"
version = "0.1.0"
description = "EPUB ingestion utilities for Librarian."
requires-python = ">=3.12"
dependencies = [
  "beautifulsoup4>=4.12.0",
  "ebooklib>=0.18",
  "numpy>=1.26.0",
  "pydantic>=2.10.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["librarian_ingestion", "librarian_config"]
